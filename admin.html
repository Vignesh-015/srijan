<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Cara</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
      body { background-color: #f4f5f9; display: flex; }
      .sidebar { width: 250px; background: #041e42; color: #fff; height: 100vh; position: fixed; padding: 20px; }
      .sidebar h2 { color: #fff; font-size: 24px; margin-bottom: 30px; }
      .sidebar a { color: #ccc; text-decoration: none; display: block; padding: 10px 0; font-size: 16px; margin-bottom: 10px; }
      .sidebar a:hover, .sidebar a.active { color: #ffbd27; }
      .main-content { margin-left: 250px; padding: 40px; width: 100%; }
      .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
      .card { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
      .card h3 { color: #888; font-size: 14px; margin-bottom: 10px; }
      .card h1 { color: #111; font-size: 32px; }
      table { width: 100%; border-collapse: collapse; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
      th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
      th { background-color: #fbfbfb; color: #555; }
  </style>
</head>
<body>
  
  <div class="sidebar">
      <h2>Cara Admin Dashboard</h2>
      <a href="#" class="active"><i class="bi bi-graph-up"></i> Overview</a>
      <a href="#"><i class="bi bi-box"></i> Inventory</a>
      <a href="#"><i class="bi bi-cart-check"></i> Orders</a>
      <a href="#" onclick="logoutBtn()"><i class="bi bi-box-arrow-right"></i> Secure Logout</a>
  </div>

  <div class="main-content">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
          <h2>Dashboard</h2>
          <button class="normal" style="background-color:#088178; color:white;">Generate Report</button>
      </div>

      <div class="card-grid">
          <div class="card">
              <h3>TOTAL REVENUE</h3>
              <h1 id="metric-rev">₹0.00</h1>
          </div>
          <div class="card">
              <h3>PENDING ORDERS</h3>
              <h1 id="metric-orders">0</h1>
          </div>
          <div class="card">
              <h3>SYSTEM STATUS</h3>
              <h1 style="color:#088178;">Online</h1>
          </div>
      </div>

      <h3 style="margin-bottom:15px;">Recent Transactions</h3>
      <table>
          <thead>
              <tr>
                  <th>Order ID</th>
                  <th>Customer Email</th>
                  <th>Date</th>
                  <th>Amount</th>
                  <th>Status</th>
              </tr>
          </thead>
          <tbody id="orders-table">
              <tr><td colspan="5" style="text-align:center;">Loading orders from Firebase...</td></tr>
          </tbody>
      </table>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  
  <!-- Reuse amazon.js to initialize firebase -->
  <script src="amazon.js"></script>
  <script>
      function logoutBtn() {
          firebase.auth().signOut().then(() => {
              window.location.href = 'index.html';
          });
      }

      document.addEventListener('DOMContentLoaded', () => {
          if(db) {
              db.ref('orders').once('value').then(snap => {
                  const data = snap.val();
                  if(!data) {
                      document.getElementById('orders-table').innerHTML = '<tr><td colspan="5" style="text-align:center;">No orders found.</td></tr>';
                      return;
                  }

                  const orders = Object.values(data).reverse();
                  let totalRev = 0;
                  let html = '';

                  orders.forEach(o => {
                      totalRev += o.total;
                      html += `
                          <tr>
                              <td><strong>\${o.orderId}</strong></td>
                              <td>\${o.user.replace(/_/g, '.')}</td>
                              <td>\${new Date(o.date).toLocaleDateString()}</td>
                              <td>₹\${o.total.toFixed(2)}</td>
                              <td><span style="background:#e8f6ea; color:#088178; padding:5px 10px; border-radius:4px; font-size:12px;">\${o.status || 'Processing'}</span></td>
                          </tr>
                      `;
                  });

                  document.getElementById('metric-rev').innerText = '₹' + totalRev.toFixed(0);
                  document.getElementById('metric-orders').innerText = orders.length;
                  document.getElementById('orders-table').innerHTML = html;
              });
          }
      });
  </script>
</body>
</html>
