<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Wishlist - E-Commerce Website</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section id="header">
    <a href="#"><img src="img/logo.png" alt="" class="logo"></a>
    <div>
      <ul id="navbar">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li id="lg-bag"><a href="cart.html"><i class="bi-solid bi-bag"></i></a></li>
      </ul>
    </div>
  </section>

  <section id="page-header" class="about-header" style="background-image: url('img/about/banner.png');">
    <h2>#wishlist</h2>
    <p>Your saved items in one place.</p>
  </section>

  <section id="product1" class="section-p1">
    <div class="pro-container" id="wishlist-container">
      <!-- Generated dynamically -->
    </div>
  </section>

  <footer class="section-p1">
    <div class="copyright"><p>© 2025, Cara - E-Commerce Webiste</p></div>
  </footer>

  <script src="products.js"></script>
  <script src="script.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script src="amazon.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('wishlist-container');
      const currentUser = JSON.parse(localStorage.getItem('current_user'));
      
      if(!currentUser) {
         container.innerHTML = '<p style="padding: 40px;">Please <a href="account.html">login</a> to view your wishlist.</p>';
         return;
      }

      const safeEmail = currentUser.email.replace(/[.#$\\[\\]]/g, '_');
      const db = firebase.database();

      db.ref('wishlist/' + safeEmail).once('value').then(snap => {
        let wishlist = snap.val() || [];
        
        if(wishlist.length === 0) {
          container.innerHTML = '<p style="padding: 40px;">Your wishlist is empty. Browse the shop to add items.</p>';
          return;
        }

        let html = '';
        wishlist.forEach(id => {
          const p = allProducts.find(item => item.id === id);
          if(p) {
            html += `
              <div class="pro" onclick="window.location.href='sproduct.html?id=\${p.id}';">
                <img src="\${p.image}" alt="">
                <div class="des">
                  <span>\${p.brand}</span>
                  <h5>\${p.name}</h5>
                  <h4>₹\${p.price}</h4>
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:10px;">
                  <button class="normal" onclick="event.stopPropagation(); addToCart('\${p.id}');">Add to Cart</button>
                  <button class="normal" style="background-color: #ffcccc; color: #a00;" onclick="event.stopPropagation(); removeFromWishlist('\${p.id}');">Remove</button>
                </div>
              </div>
            `;
          }
        });
        container.innerHTML = html;
      });
    });

    window.removeFromWishlist = function(id) {
      const currentUser = JSON.parse(localStorage.getItem('current_user'));
      if(!currentUser) return;
      const safeEmail = currentUser.email.replace(/[.#$\\[\\]]/g, '_');
      const db = firebase.database();

      db.ref('wishlist/' + safeEmail).once('value').then(snap => {
          let wishlist = snap.val() || [];
          wishlist = wishlist.filter(item => item !== id);
          db.ref('wishlist/' + safeEmail).set(wishlist).then(() => {
              location.reload();
          });
      });
    }
  </script>
  <script src="cara_chatbot.js"></script>
</body>
</html>
