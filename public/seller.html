<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Dashboard - E-Commerce Website</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .seller-container { display: flex; flex-wrap: wrap; gap: 30px; padding: 40px; }
    .add-product { flex: 1; min-width: 300px; background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #ccc; }
    .add-product input, .add-product select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; }
    .inventory { flex: 2; min-width: 400px; background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #ccc; }
    .inv-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
  </style>
</head>
<body style="background: #f0f2f5;">
  <section id="header">
    <a href="#"><img src="img/logo.png" alt="" class="logo"></a>
    <div>
      <ul id="navbar">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
      </ul>
    </div>
  </section>

  <section class="seller-container">
    <div class="add-product">
      <h3>Add New Product</h3>
      <input type="text" id="n-name" placeholder="Product Name (e.g. Smart Watch)" required>
      <input type="text" id="n-brand" placeholder="Brand Name" required>
      <input type="number" id="n-price" placeholder="Price (₹)" required>
      <select id="n-category">
        <option value="Clothing">Clothing</option>
        <option value="Footwear">Footwear</option>
        <option value="Accessories">Accessories</option>
      </select>
      <input type="text" id="n-image" placeholder="Image URL (Unsplash link works)">
      <button class="normal" style="background: #f08804; color: #fff; width: 100%;" onclick="addProduct()">List Product</button>
    </div>
    
    <div class="inventory">
      <h3>Your Inventory</h3>
      <div id="inv-container" style="max-height: 400px; overflow-y: auto; margin-top:20px;"></div>
    </div>
  </section>

  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script src="amazon.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
       renderInventory();
    });

    function addProduct() {
      const name = document.getElementById('n-name').value;
      const brand = document.getElementById('n-brand').value;
      const price = parseFloat(document.getElementById('n-price').value);
      const category = document.getElementById('n-category').value;
      const image = document.getElementById('n-image').value || 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&q=80&w=400&h=400';

      if(!name || !brand || !price) {
        alert("Please fill name, brand, and price.");
        return;
      }

      const newP = {
        id: 'cust_' + Math.floor(Math.random()*10000),
        name, brand, price, category, image, rating: 5, isFeatured: false, isNew: true
      };

      const db = firebase.database();
      db.ref('custom_products/' + newP.id).set(newP).then(() => {
          alert(name + " listed successfully!");
          renderInventory();
          document.getElementById('n-name').value = '';
          document.getElementById('n-price').value = '';
      });
    }

    function renderInventory() {
       const container = document.getElementById('inv-container');
       const db = firebase.database();
       
       db.ref('custom_products').once('value').then(snap => {
           let prodsMap = snap.val();
           if(!prodsMap) {
             container.innerHTML = '<p>You have not listed any custom products yet.</p>';
             return;
           }

           let customProducts = Object.values(prodsMap);
           let html = '';
           customProducts.forEach(p => {
             html += `
               <div class="inv-item">
                 <div style="display:flex; align-items:center; gap:15px;">
                   <img src="${p.image}" width="50" height="50" style="border-radius:4px; object-fit:cover;">
                   <div>
                     <strong>${p.name}</strong><br>
                     <span style="font-size:12px; color:#555;">${p.category} | ${p.brand}</span>
                   </div>
                 </div>
                 <div>
                   <strong>₹${p.price}</strong>
                   <button onclick="removeProduct('${p.id}')" style="margin-left:15px; border:none; background:red; color:white; padding:5px 10px; border-radius:4px; cursor:pointer;">Delete</button>
                 </div>
               </div>
             `;
           });
           container.innerHTML = html;
       });
    }

    window.removeProduct = function(id) {
       const db = firebase.database();
       db.ref('custom_products/' + id).remove().then(() => {
           renderInventory();
       });
    }
  </script>
  <script src="cara_chatbot.js"></script>
</body>
</html>
